<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LM2596 Calculator - Browser Demo</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      color: #333;
      margin-bottom: 10px;
    }
    .subtitle {
      color: #666;
      margin-bottom: 30px;
    }
    .input-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: 600;
      color: #444;
    }
    input[type="number"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 16px;
      box-sizing: border-box;
    }
    textarea {
      width: 100%;
      min-height: 300px;
      padding: 15px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.5;
      box-sizing: border-box;
      background: #f9f9f9;
      resize: vertical;
    }
    .result-label {
      margin-top: 30px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>LM2596 Buck Converter Calculator</h1>
    <p class="subtitle">Headless browser demo - Auto-updates on input change</p>
    
    <div class="input-group">
      <label for="inputV">Input Voltage (V):</label>
      <input id="inputV" type="number" value="12" step="0.1" min="0">
    </div>
    
    <div class="input-group">
      <label for="outputV">Output Voltage (V):</label>
      <input id="outputV" type="number" value="5" step="0.1" min="0">
    </div>
    
    <div class="input-group">
      <label for="outputA">Output Current (A):</label>
      <input id="outputA" type="number" value="1.2" step="0.1" min="0">
    </div>
    
    <label class="result-label" for="result">Results:</label>
    <textarea id="result" readonly></textarea>
  </div>

  <!-- Load the calculator library -->
  <script type="module">
    import { bindToElements } from './src/browser/index.ts';
    
    // Bind calculator to DOM elements with auto-update
    bindToElements({
      inputVoltageId: 'inputV',
      outputVoltageId: 'outputV',
      outputCurrentId: 'outputA',
      resultId: 'result',
      resultProperty: 'value',
      autoUpdate: true
    });
  </script>
</body>
</html>
